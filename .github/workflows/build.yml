name: STELLARHUNTS

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
permissions: read-all

# ─────────────────────────────────────────────────────────────────────
# Onchain jobs (contracts)
# ─────────────────────────────────────────────────────────────────────
jobs:
  onchain-build:
    name: Build contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt

      # See onchain/Cargo.lock for pinned dependency resolutions.
      - name: Build contracts (release wasm)
        working-directory: onchain
        run: cargo build --workspace --target wasm32-unknown-unknown --release --locked

      - name: Format check
        working-directory: onchain
        run: cargo fmt --all -- --check

      # ── cargo-deny ────────────────────────────────────────────
      # Audit dependencies for security advisories, license compliance,
      # and duplicate crate versions.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny check
        working-directory: onchain
        run: cargo deny --locked check advisories licenses bans sources

  onchain-test:
    name: Test contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build contracts (test profile)
        working-directory: onchain
        run: cargo build --workspace --tests --locked

      - name: Run unit tests
        working-directory: onchain
        run: cargo test --workspace --locked

  # ─────────────────────────────────────────────────────────────────────
  # Backend CI
  # ─────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: npm audit
        working-directory: backend
        # --audit-level=high exits with non-zero if any advisory at
        # severity high or critical is found.
        run: npm audit --audit-level=high
        continue-on-error: true

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests
        working-directory: backend
        run: npm test -- --passWithNoTests

  # ─────────────────────────────────────────────────────────────────────
  # Frontend CI
  # ─────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
