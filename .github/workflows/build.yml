name: CONTRACT

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.8.4"

      - run: scarb fmt --check
        working-directory: onchain

      - run: scarb build
        working-directory: onchain

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.8.4"

      - uses: foundry-rs/setup-snfoundry@v3
        with:
          starknet-foundry-version: "0.30.0"

      - run: snforge test
        working-directory: onchain
